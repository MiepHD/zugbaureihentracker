<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=#, initial-scale=1.0">
    <link
      rel="stylesheet"
      type="text/css"
      href="/general/all.css"
    />
    <title>Zugsammler | Baureihe hinzufügen</title>
</head>
<body>
    <form action="/api/addBaureihe" method="post" class="easyform">
        <label for="ubid">UBID:</label>
        <input type="text" id="ubid" name="ubid" required>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <label for="beschreibung">Beschreibung:</label>
        <input type="text" id="beschreibung" name="beschreibung">
        <label for="passwort">Admin-Passwort:</label>
        <input type="password" id="passwort" name="passwort">
        <div></div>
        <button>Hinzufügen</button>
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en" style="width: 100%; height: 100%; margin:0;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=#, initial-scale=1.0">
    <title>Baureihe hinzufügen</title>
</head>
<body style="margin: auto; width: max-content; height: max-content; position: absolute; top:0;bottom:0;left:0;right:0;">
    <form action="/api/addBaureihe" method="post" style="display: grid;grid-template-columns: max-content max-content;gap: 1ch;">
        <label for="ubid">UBID:</label>
        <input type="text" id="ubid" name="ubid">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <label for="beschreibung">Beschreibung:</label>
        <input type="text" id="beschreibung" name="beschreibung">
        <label for="passwort">Admin-Passwort:</label>
        <input type="password" id="passwort" name="passwort">
        <div></div>
        <button>Hinzufügen</button>
    </form>
</body>
</html>

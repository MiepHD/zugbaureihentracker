    <main>
      <h1>Willkommen beim Zugbaureihentracker!</h1>
      <form data-api="/api/nutzer/json/anmelden" class="easyform">
        <label for="fname">Benutzername:</label>
        <input type="text" id="fname" name="username" required>
        <label for="lname">Passwort:</label>
        <input type="password" id="lname" name="passwort" required>
        <br/>
        <button>Anmelden</button>
      </form>

    </main>

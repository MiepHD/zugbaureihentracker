<!doctype html>
<html lang="de">
  <head>
    <link
      rel="stylesheet"
      type="text/css"
      href="/general/all.css"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta property="og:type" content="website" />
    <script src="/registrieren/RegistrierenSeite.js" defer></script>
    <title>Zugsammler | Registrieren</title>
  </head>
  <body>
    <form id="registerForm"  method="post" action="/api/registrieren">
      <p>Registrieren sie sich auf der Seite:</p>
      <p>Benutzername</p>
      <input name="username" required/>
      <p>Passwort eingeben</p>
      <input id="password" type="password" name="passwort" required/>
      <p>Passwort erneut eingeben</p>
      <input id="passwordConfirm" type="password" name="passwortConfirm" required/>
      <div id="errorMessage" style="color:red; margin-top:0.5rem;"></div>
      <button type="submit">Registrieren</button>
    </form>
  </body>
</html>

<!doctype html>
<html lang="de">
  <head>
    <link
      rel="stylesheet"
      type="text/css"
      href="/general/all.css"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta property="og:type" content="website" />
    <script src="/registrieren/RegistrierenSeite.js" defer></script>
    <title>Zugbaureihentracker | Registrieren</title>
  </head>
  <body>
    <form id="registerForm"  method="post" action="/api/registrieren" class="easyform">
      <p style="grid-column: 1 / span 2;">Registrieren Sie sich auf der Seite:</p>
      <label for="benutzername">Benutzername</label>
      <input name="username" id="benutzername" required/>
      <label for="password">Passwort eingeben</label>
      <input id="password" type="password" name="passwort" required/>
      <label for="passwordConfirm">Passwort erneut eingeben</label>
      <input id="passwordConfirm" type="password" name="passwortConfirm" required/>
      <div id="errorMessage" style="color:red; margin-top:0.5rem;"></div>
      <button type="submit">Registrieren</button>
    </form>
  </body>
</html>

    <form id="registerForm" class="w-element cr4fvfc" method="post" action="/api/registrieren">
      <p class="w-element c1om5cls">Registrieren sie sich auf der Seite:</p>
      <p class="w-element cwr8nfl c102jjjj c1immebf">Benutzername</p>
      <input class="w-element c1o20x6o" name="username" />
      <p class="w-element cwr8nfl c102jjjj c1immebf">Passwort eingeben</p>
      <input id="password" class="w-element c1o20x6o" type="password" name="passwort" />
      <p class="w-element cwr8nfl c102jjjj c1immebf">
        Passwort erneut eingeben
      </p>
      <input id="passwordConfirm" class="w-element c1o20x6o" type="password" name="passwortConfirm" />
      <div id="errorMessage" class="w-element" style="color:red; margin-top:0.5rem;"></div>
      <button class="w-element" type="submit">

        registrieren
      </button>
    </form>
    <script>
      document.getElementById('registerForm').addEventListener('submit', function (event) {
        const pass1 = document.getElementById('password').value;
        const pass2 = document.getElementById('passwordConfirm').value;
        const errorMessage = document.getElementById('errorMessage');

        if (pass1 !== pass2) {
          event.preventDefault();
          errorMessage.textContent = 'Die Passwörter stimmen nicht überein.';
        } else {
          errorMessage.textContent = '';
        }
      });
    </script>

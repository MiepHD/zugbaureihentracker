<!doctype html>
<html lang="de">
  <head>
    <link
      rel="stylesheet"
      type="text/css"
      href="/general/all.css"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Zugsammler | Anmelden</title>
    <script src="/login/LoginSeite.js" defer></script>
  </head>
  <body>
    <h1>Willkommen beim Zugsammler!</h1>
    <form action="/api/anmelden" method="post">
      <label for="fname">Benutzername:</label>
      <input type="text" id="fname" name="username"><br><br>
      <label for="lname">Passwort:</label>
      <input type="password" id="lname" name="passwort"><br><br>
      <input type="submit" value="anmelden">
      <p>Sie haben noch kein Konto? Klicken Sie hier:</p>
      <a href="/registrieren">Registrieren</a>
    </form>
  </body>
</html>

];

// Login-Funktion
function login() {

    const email = document.getElementById("e-mail(account-search)").value;
    const password = document.getElementById("password(account-search)").value;

    const user = users.find(
        u => u.email === email &&
             u.password === password
    );

    if (user) {
        alert("Login erfolgreich! Willkommen " + user.email);
    } else {
        alert("E-Mail oder Passwort falsch.");
    }
}

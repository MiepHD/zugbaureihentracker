      <script>
      const users = [
          { email: "max@example.com", password: "Max123" },
          { email: "anna@example.com", password: "Anna456" },
          { email: "tom@example.com", password: "Tom789" }
      ];
      
      function login() {
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
      
          console.log("Eingegebene E-Mail:", email);
          console.log("Eingegebenes Passwort:", password);
      
          const user = users.find(u => u.email === email && u.password === password);
      
          if (user) {
              console.log("Login erfolgreich! Willkommen " + user.email);
          } else {
              console.log("E-Mail oder Passwort falsch.");
          }
      }
